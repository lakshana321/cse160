<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Blocky Animal</title>
</head>

<body onload="main()">
    <p>
        Camera Angle:
        <input type="range" min="-180" max="180" value="0" id="angleSlide">
    </p>
    <p>
        Tail Angle:
        <input type="range" min="-45" max="45" value="0" id="tailSlide">
      </p>
      
      <p>
        Paw Angle:
        <input type="range" min="-45" max="45" value="0" id="pawSlide">
      </p>
      <p>
        Thigh Angle:
        <input type="range" min="-45" max="45" value="0" id="thighSlide">
      </p>
      
      <p>
        Calf Angle:
        <input type="range" min="-45" max="45" value="0" id="calfSlide">
      </p>
      <p>
        Animation:
        <button id="animOn">ON</button>
        <button id="animOff">OFF</button>
      </p>

      <p id="performance">FPS: --</p>
      <!-- Canvas -->
  <canvas id="webgl" width="400" height="400">
    Please use a browser that supports WebGL
  </canvas>

  <!-- WebGL helper libraries -->
  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="lib/cuon-utils.js"></script>

  <!-- Your files (ORDER MATTERS) -->
  <script src="Triangle.js"></script>
  <script src="Cube.js"></script>
  <script src="Cone.js"></script>
  <script src="BlockyAnimal.js"></script>

</body>
</html>
